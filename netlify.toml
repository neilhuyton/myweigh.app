[build]
  publish = "dist"          # ← change this if your output folder is different
  command = "npm run build" # ← your current build command, keep it here as default

[context.production]
  command = "npx prisma generate && npx prisma migrate deploy && npm run build"

[[redirects]]
  from = "/trpc/*"
  to = "/.netlify/functions/trpc/:splat"
  status = 200
  force = true
  # This line forwards the Authorization header to the function
  headers = { Authorization = "{Authorization}" }

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200